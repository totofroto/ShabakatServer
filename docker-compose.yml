version: "3.8"

services:
  shabakat:
    build: .
    network_mode: "host"
    image: shabakat-server:v4
    container_name: shabakat-server
    restart: unless-stopped

    # CRITICAL: host networking gives the scanner raw LAN access —
    # SSDP multicast, mDNS, /proc/net/arp, and real ICMP all require it.

    # NET_RAW: allows real ICMP ping (not just TCP probe)
    cap_add:
      - NET_ADMIN
      - NET_RAW

    env_file:
      - .env

    volumes:
      # SQLite database persists here across container restarts / upgrades
      - ./data:/data
